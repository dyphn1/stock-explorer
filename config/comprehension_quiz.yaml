# Comprehension Check Quiz Questions (C101)
# Each question has: id, text, options: list of (key, label, explanation), correct_key
questions:
  - id: roe_meaning
    text: ROE（股東權益報酬率）代表什麼？
    correct_key: a
    options:
      - [a, "公司運用股東投入資金赚取報酬的效率", "ROE 衡量公司用股東的錢賺了多少報酬。ROE 越高，代表公司運用資金的效率越好。這就像你開一家店，投入 100 萬，一年賺 20 萬，ROE 就是 20%。"]
      - [b, "公司每年的營收成長率", "這是營收年增率，不是 ROE。ROE 關注的是「股东投入的錢」賺了多少，而不是營收增加了多少。"]
      - [c, "公司每股股票的獲利", "這是 EPS（每股盈餘），不是 ROE。ROE 是股東權益報酬率，分母是股東權益，不是股數。"]
      - [d, "公司配發給股東的股利", "這是股利，不是 ROE。ROE 是公司賺到錢後，衡量「用股東的錢」賺了多少的效率指標。"]

  - id: per_low_is_cheap
    text: 本益比（PER）越低，代表股票越便宜、越值得買嗎？
    correct_key: b
    options:
      - [a, "對，本益比越低一定越值得買", "不一定！低本益比可能是市場認為公司未來成長性不佳，或是有潛在的風險。不能只看數字低就買進。"]
      - [b, "不一定，要看產業特性和公司成長性", "正確！不同產業的本益比區間不同。科技公司因為市場預期未來成長性高，本益比通常較高；而成熟產業的本益比通常較低。要用同產業的公司來比較才有意義。"]
      - [c, "完全無關，本益比沒有任何參考價值", "本益比還是有參考價值的，只是不能「單一指標」做判斷。它是一個很好的起點，幫助你思考「市場願意為每塊錢獲利付多少價格」。"]
      - [d, "對，所以只要找本益比最低的股票就好", "可能有陷阱！低本益比有時是因為公司遇到問題、獲利即將衰退，或市場發現了你沒注意到的風險。投資不能「只看便宜」。"]

  - id: gross_margin_decline
    text: 一家公司毛利率下降，最可能代表什麼？
    correct_key: c
    options:
      - [a, "公司的營收正在下降", "毛利率下降不代表營收下降，兩者是不同的概念。毛利率是「營收減去成本後佔營收的比例」，營收可能還在成長，只是賺的比例變少了。"]
      - [b, "公司的員工人數增加", "員工人數增加不一定直接導致毛利率下降，除非是人事成本大幅上升。但更常見的原因是原物料成本上升或競爭加劇。"]
      - [c, "成本上升或市場競爭加劇", "正確！毛利率 = （營收 - 成本）/ 營收。毛利率下降，代表成本佔營收的比例變高了——可能是原物料漲價、公司被迫降價競爭，或產品組合變化所致。"]
      - [d, "公司正在擴大投資", "擴大投資可能影響淨利，但不直接導致毛利率下降。毛利率是衡量「產品本身」的獲利能力，跟投資決策較無直接關係。"]

  - id: why_no_buy_sell_advice
    text: 股識為什麼不提供買賣建議？
    correct_key: a
    options:
      - [a, "因為我們的角色是幫助你認識公司，不是推薦股票", "正確！股識的定位是「歷史學家」——幫你整理公司的歷史資料和數據。買賣決策需要考量你的個人財務狀況、風險承受度和投資目標，這些只有你能決定。"]
      - [b, "因為我們不知道答案", "這不是原因！我們整理了大量的公開數據和歷史資料，但投資決策涉及太多個人因素，提供買賣建議需要執照，也不適合由工具來執行。"]
      - [c, "因為政府禁止討論股票", "政府沒有禁止討論股票，但提供投資建議需要相關的金融執照。股識的定位是資訊整理和投資教育，不是投資顧問。"]
      - [d, "因為我們只分析 ETF", "不對，股識也分析個股。重點是我們的角色是「幫你認識公司」而非「告訴你該買還是該賣」。"]

  - id: revenue_growth_not_profit
    text: 營收年增率是正的，就代表公司賺錢嗎？
    correct_key: b
    options:
      - [a, "對，營收成長就代表公司賺錢", "錯！營收只是「進來的錢」，但公司可能成本更高、費用更大。營收成長但虧損的公司很常見，特別是在新創或快速擴張的公司。"]
      - [b, "不一定，營收成長不代表有獲利", "正確！營收是 top line（營收總額），但公司還要扣除成本、費用、稅金等。如果一個公司營收年年成長但費用成長更快，還是可能虧損。這就是為什麼要同時看「毛利率」和「淨利率」。"]
      - [c, "代表公司收支平衡", "營收成長不代表收支平衡。收支平衡是收入等於成本，但正營收年增率只代表「營收比去年多」，不代表「賺的錢夠覆蓋支出」。"]
      - [d, "只有製造業才能這樣判斷", "這個說法沒有道理。任何產業的公司都可能營收成長但虧損，這是普遍的財務概念，不分產業。"]
