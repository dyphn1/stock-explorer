id: "lesson_06"
title: "定期定額：懶人投資法"
order: 6
icon: "💰"
estimated_time: "8 分鐘"
difficulty: "入門"
learning_objectives:
  - "理解定期定額的核心概念"
  - "知道定期定額如何降低時機風險"
  - "了解什麼樣的投資標的適合定期定額"
  - "認識定期定額的優缺點"
content:
  - type: heading
    text: "定期定額是什麼？"
  - type: paragraph
    text: "定期定額（Dollar-Cost Averaging，簡稱 DCA）是一種「固定時間、固定金額」的投資策略。簡單來說，你不需要去猜測現在是不是「最好的買進時機」，而是每隔一段時間（例如每月）投入固定的金額買進股票或基金。"
  - type: paragraph
    text: "這種方法的核心精神是：放棄預測市場，用紀律和時間來平滑價格波動。你不需要是投資大師，不需要知道底部在哪裡，只需要持續執行。"
  - type: callout
    style: "info"
    text: "💡 重點：定期定額不是為了「買在最低點」，而是透過長期分散投入，讓買入的成本自然分布在不同價格區間，避免一次買在高點的風險。"

  - type: heading
    text: "定期定額怎麼運作？用一個範例來看"
  - type: paragraph
    text: "假設我們用「範例公司」這支股票來說明，每月固定投入 3,000 元，連續六個月，股價變化如下："
  - type: paragraph
    text: "第一個月：股價 50 元 → 買進 60 股\n第二個月：股價 45 元 → 買進 66.67 股\n第三個月：股價 55 元 → 買進 54.55 股\n第四個月：股價 40 元 → 買進 75 股\n第五個月：股價 52 元 → 買進 57.69 股\n第六個月：股價 48 元 → 買進 62.5 股"
  - type: paragraph
    text: "六個月下來，你總共投入了 18,000 元，累積了約 375.41 股。你的平均每股成本約為 47.95 元。"
  - type: callout
    style: "tip"
    text: "🎯 注意到了嗎？當股價跌到 40 元時，同樣 3,000 元可以買到更多股數（75 股），這就是定期定額的「自動加碼」效果——價格便宜時，固定金額自然買得更多，拉低整體平均成本。"

  - type: heading
    text: "定期定額的三大好處"
  - type: paragraph
    text: "一、降低時機風險：最大的好處是你不需要「猜底」。即使你在股價相對高點開始投資，後續股價下跌時，你反而能用更低的價格買進更多股數，長期下來平均成本會被拉低。"
  - type: paragraph
    text: "二、建立投資紀律：定期定額強迫你養成「固定投入」的習慣，避免因為貪婪或恐懼而做出情緒化的投資決策。市場漲的時候不會過度追高，跌的時候也不會因為恐慌而全部賣出。"
  - type: paragraph
    text: "三、小資族友善：不需要一次拿出大額資金，每月幾千元就能開始投資。這種低門檻的特性，讓剛出社會或資金有限的投資人也能參與市場。"

  - type: heading
    text: "定期定額不是萬能的"
  - type: paragraph
    text: "雖然定期定額有很多優點，但它也有一些重要的限制需要了解。"
  - type: callout
    style: "warning"
    text: "⚠️ 重要提醒：定期定額「不保證獲利」。如果你投資的標的長期下跌，定期定額只會讓你「平均地虧損」，而不是賺錢。它降低的是「時機」的風險，而不是「標的本身」的風險。"
  - type: paragraph
    text: "定期定額最適合長期趨勢向上的投資標的，例如整體市場指數型基金（ETF）或體質良好的公司。如果一家公司長期衰退，越買只會越虧。"
  - type: paragraph
    text: "此外，定期定額需要耐心。短期內你可能看不到明顯的報酬，甚至可能處於虧損狀態。但長期來看，透過時間和複利的效果，定期定額的優勢才會逐漸顯現。"

  - type: heading
    text: "什麼時候適合用定期定額？"
  - type: paragraph
    text: "定期定額在以下情況特別有效：市場波動較大時，價格忽高忽低，定期定額能自動在低點買多、高點買小；你沒有時間研究市場，不想天天看盤，定期定額讓你「設定好就忘記」；你剛開始投資，還沒有足夠經驗判斷買賣時機。"
  - type: paragraph
    text: "但如果你已經有很明確的市場判斷能力，或者投資的標的是長期衰退的產業，那定期定額可能不是最佳選擇。"
  - type: callout
    style: "tip"
    text: "🎯 總結：定期定額是一種「用紀律克服人性」的投資方法。它不追求完美，但追求穩定和持續。對於大多數投資人來說，這是最簡單、也最容易長期執行的策略。"
quiz:
  - id: "l06_q1"
    text: "定期定額最主要的優勢是什麼？"
    correct_key: "b"
    options:
      - ["a", "保證每次買在最低點", "定期定額無法預測最低點，它的優勢不在於精準擇時，而在於分散風險。"]
      - ["b", "降低時機風險，避免一次買在高點", "正確！定期定額透過分散投入時間，讓買入價格自然分布，減少因一次性投入而買在高點的風險。"]
      - ["c", "每次都能獲得最高的報酬率", "定期定額不保證最高報酬率，它的目標是穩定、紀律地累積資產。"]
      - ["d", "完全消除投資虧損的可能", "沒有任何方法能完全消除虧損風險，定期定額只能降低時機風險，不能消除標的本身的風險。"]
  - id: "l06_q2"
    text: "在定期定額的範例中，當股價從 50 元跌到 40 元時，同樣投入 3,000 元會發生什麼事？"
    correct_key: "c"
    options:
      - ["a", "買到的股數變少，因為股價變便宜了", "股價變便宜時，同樣金額能買到更多股數，不是更少。"]
      - ["b", "買到的股數不變，因為投入金額固定", "投入金額固定時，股價越低，買到的股數越多。"]
      - ["c", "買到的股數變多，因此拉低了整體平均成本", "正確！股價下跌時，固定金額能買進更多股數，這就是定期定額「自動加碼」的效果，有助於拉低平均成本。"]
      - ["d", "應該停止投入，等股價更低再買", "定期定額的精神是持續紀律投入，不是試圖預測底部。停止投入反而違背了這個策略的原則。"]
  - id: "l06_q3"
    text: "以下關於定期定額的描述，哪一項是正確的？"
    correct_key: "d"
    options:
      - ["a", "定期定額保證長期一定獲利", "定期定額不保證獲利。如果投資標的長期下跌，結果仍可能是虧損的。"]
      - ["b", "定期定額適合短期操作，三個月就能看到顯著效果", "定期定額是長期策略，短期內可能看不到明顯效果，甚至可能處於虧損狀態。"]
      - ["c", "定期定額只適合投資單一公司的股票", "定期定額更適合長期趨勢向上的標的，例如指數型基金（ETF），而非單一公司。"]
      - ["d", "定期定額需要長期投入和耐心，才能發揮效果", "正確！定期定額的優勢在於透過時間分散風險，需要長期紀律執行才能看到成效。"]
completion_message: "🎉 恭喜完成第六課！你已經理解了定期定額的投資策略。"
