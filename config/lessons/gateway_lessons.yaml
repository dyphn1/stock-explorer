# Gateway Lessons — C163 Learn First Gate
# 4 micro-lessons introducing Stock Explorer to new users.
lessons:
  - id: welcome
    title: 歡迎來到股識
    icon: 👋
    content: |
      股識是一個幫助你「認識公司」的工具。
      
      不同於一般股票 App 強調買賣時機，股識專注於告訴你這家公司發生了什麼事——從故事、財務數據到市場事件，讓你建立自己的判斷。
    visual_area: |
      🎯 核心理念：先認識公司，再思考投資

  - id: how_to_read
    title: 怎麼看公司名片
    icon: 📖
    content: |
      公司名片是股識的核心頁面。它用「故事卡」呈現公司的營運概況，用「健康分數」顯示財務體質，用「事件時間軸」記錄重要變化。
      
      試著從名片頁開始，了解一家公司是做什麼的、最近有什麼重要事件。
    visual_area: |
      💡 上方有分頁標籤，可以切換到不同觀點看同一家公司

  - id: beginner_mode
    title: 新手模式與進階模式
    icon: 🌱
    content: |
      股識提供兩種模式：
      
      **新手模式**：只顯示最重要的資訊，適合剛開始的使用者。
      **進階模式**：顯示所有數據、圖表和分析，適合有經驗的使用者。
      
      你可以在任何時候切換模式，不用擔心設定錯誤。
    visual_area: |
      🔬 進階模式包含：護城河分析、同業比較、財務體質詳細數據等

  - id: disclaimer
    title: 使用須知
    icon: 📋
    content: |
      股識提供的是「公司紀錄」，不是投資建議。
      
      所有資訊僅供學習參考，不構成投資建議。投資有風險，請自行判斷。
      
      準備好了嗎？讓我們開始探索！
    visual_area: |
      ⚖️ 我們是「公司紀錄者」，不是「股票推薦者」
