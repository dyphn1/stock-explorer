id: "lesson_05"
title: "建立觀察名單策略"
order: 5
icon: "📋"
estimated_time: "7 分鐘"
difficulty: "中級"
learning_objectives:
  - "了解什麼是觀察名單及其用途"
  - "學會設定篩選條件的基本方法"
  - "建立有系統的投資研究流程"
content:
  - type: heading
    text: "為什麼需要觀察名單？"
  - type: paragraph
    text: "想像你是一個球探，你的工作不是看到一支就打一支，而是先建立一個「觀察名單」，持續追蹤你有興趣的球員，等到他們進入最佳狀態、價格合理時才出手。投資也是一樣。建立觀察名單的目的，是讓你在市場波動劇烈的時候，不會手足無措、隨意出手。"
  - type: paragraph
    text: "觀察名單不是「購買清單」，而是「研究清單」。它的作用是幫助你：第一，有系統地管理你的研究方向；第二，等公司進入你認為合理的價格區間時提醒自己；第三，避免因市場情緒波動而做出衝動決策。巴菲特曾說：「投資很簡單，但不容易。」觀察名單就是讓你在「不容易」的市場中保持紀律的工具。"
  - type: callout
    style: "info"
    text: "💡 一個好的觀察名單通常包含 15-30 間公司——太少會錯過機會，太多會分散注意力。寧可深入了解少數公司，也不要對很多公司一知半解。"
  - type: heading
    text: "如何選擇納入觀察名單的公司？"
  - type: paragraph
    text: "你可以從以下幾個面向來建立篩選條件：\n\n**產業面**：選擇你了解的產業。如果你在科技產業工作，你對 IC 設計、半導體供應鏈的理解可能比別人深，這就是你的「能力圈」。巴菲特說：「我從不在能力圈外面投資。」\n\n**基本面門檻**：設定基本的財務標準，例如 ROE > 15%（代表公司能有效運用股東資金）、負債比 < 50%（代表財務體質穩健）、連續 5 年以上獲利（代表業績不是僥倖）。\n\n**護城河確認**：確認公司擁有至少一種護城河。前面一課學到的品牌、專利、規模經濟、網路效應、轉換成本，都應該是你評估的重點。\n\n**估值合理性**：目前的本益比跟你認為的合理區間相比如何？如果目前的估值太高，就先放入觀察名單，等待合理價格出現。"
  - type: heading
    text: "觀察名單的管理與更新"
  - type: paragraph
    text: "建立觀察名單只是開始，持續追蹤才是關鍵。建議你每季檢視一次觀察名單上的公司，關注以下變化：財報是否維持你預期的表現？護城河有被競爭對手侵蝕的跡象嗎？管理階層有沒有做任何可能傷害長期價值的決策？"
  - type: paragraph
    text: "最重要的是：如果一間公司的基本面已經不符合你的標準（例如護城河消失、負面趨勢確立），要有勇氣把它從名單上移除，即使你過去對它有很多研究。情緒上的依恋是投資的大敵。"
  - type: stock_example
    stock_id: "2881"
    stock_name: "富邦金"
    text: "以富邦金（2881）為例，金控公司的觀察重點包括：淨值是否穩定成長？壞帳比率是否在可控範圍內？數位金融轉型進展如何？壽險與銀行雙引擎的獲利結構是否平衡？金控公司的護城河通常來自「規模」、「品牌信任」和「法規障礙」——開設新的銀行需要極高的資本門檻和法規核准，這本身就是一個強大的進入障礙。"
    data_points:
      - label: "目前股價"
        source: "latest_price.close"
  - type: heading
    text: "建立你的投資研究流程"
  - type: paragraph
    text: "一個簡單但有效的研究流程是：先從「分類瀏覽」或「股票探索」找到你有興趣的公司，然後逐一檢查它的名片頁、營收結構和財務體質。如果你對它產生信心，就把它加入「我的關注」。定期回來看看這些公司的近況，讓數據跟你的論點持續對話。記住：研究不是一次性的工作，而是持續的過程。"
  - type: callout
    style: "tip"
    text: "🎯 歷史學家提醒：建立觀察名單不代表你永遠不會犯錯。它的意義在於：讓每一次決策都是經過深思熟慮的，而不是衝動的。「做好研究、保持耐心、尊重市場」是長期投資最重要的三件事。"
quiz:
  - id: "l05_q1"
    text: "建立觀察名單的主要目的是什麼？"
    correct_key: "c"
    options:
      - ["a", "幫朋友推薦股票", "觀察名單是給自己用的研究工具，不是推薦工具。"]
      - ["b", "記住所有股票代號", "記股票代號不是觀察名單的目的。"]
      - ["c", "系統化追蹤研究方向，等到合理價格時才有準備", "正確！觀察名單讓你在市場波動時不會手足無措，有紀律地做出投資決策。"]
      - ["d", "炫耀自己研究了很多公司", "這不是觀察名單的用途。"]
  - id: "l05_q2"
    text: "一個好的觀察名單建議包含幾間公司？"
    correct_key: "b"
    options:
      - ["a", "5 間以下", "太少可能會錯失很多好的投資機會。"]
      - ["b", "15-30 間", "正確！這個數量讓你既不至於分散注意力，也能涵蓋足夠的產業多元性。"]
      - ["c", "100 間以上", "太多了，你不可能深入了解 100 間公司。"]
      - ["d", "越多越好", "數量多不代表品質好。深入了解少數公司比對很多公司一知半解更有用。"]
  - id: "l05_q3"
    text: "巴菲特說的「能力圈」是指什麼？"
    correct_key: "a"
    options:
      - ["a", "只投資自己真正了解的產業和公司", "正確！能力圈的意義是：在你了解的範圍內投資，不要假装自己懂你不懂的東西。"]
      - ["b", "投資最多人關注的熱門股票", "熱門不一定是你了解的，也不一定是好投資。"]
      - ["c", "只會投資 Berkshire Hathaway", "巴菲特投資很多不同的公司，但他都只在自己了解的範圍內。"]
      - ["d", "研究能力最強的投資人", "能力圈不是指投資技巧，而是指你理解的產業和公司的範圍。"]
  - id: "l05_q4"
    text: "當觀察名單上的公司基本面惡化時，你應該怎麼做？"
    correct_key: "d"
    options:
      - ["a", "繼續持有，因為你已經研究很久了", "沉沒成本不應該影響你的決策。研究花了多少時間不代表公司值得投資。"]
      - ["b", "立刻賣出", "觀察名單不是持有清單——如果公司還不在你的投資組合中，不存在賣出的問題。"]
      - ["c", "加碼攤平", "基本面惡化不是加碼的理由，這可能讓損失更大。"]
      - ["d", "把它從觀察名單中移除，即使過去花費了很多時間研究", "正確！投資中最需要克服的就是情緒依恋。基本面不符合標準，就應該果斷移除。"]
