id: "lesson_01"
title: "股票是什麼？"
order: 1
icon: "📘"
estimated_time: "5 分鐘"
difficulty: "入門"
learning_objectives:
  - "理解股票的基本意義"
  - "知道買股票等同於成為公司股東"
  - "了解股價漲跌的基本原理"
content:
  - type: heading
    text: "股票的本質"
  - type: paragraph
    text: "當你買了一張股票，你並不是在買一張「彩票」，而是在買一間公司的「一小部分所有權」。這個所有權讓你成為公司的股東，有權分享公司的獲利（透過股利），也有權參與公司的重要決策（透過股東會投票）。"
  - type: callout
    style: "info"
    text: "💡 重點：股票不是賭博，投資的本質是「你相信這家公司未來會越來越好，所以現在成為它的一部分擁有者」。"
  - type: heading
    text: "股價為什麼會漲跌？"
  - type: paragraph
    text: "很多人以為炒股就是「低買高賣」這麼簡單，但股價背後反映的是市場對公司「未來獲利能力」的預期。當很多人看好一間公司的前景，搶著買入股票，需求增加、供給減少，股價就會上漲；反之，當大家不看好，紛紛賣出，股價就會下跌。"
  - type: paragraph
    text: "你可以這樣想：股價就像一間餐廳的聲譽。當很多人覺得它好吃又划算，排隊的人越來越多，「入場費」（股價）自然水漲船高。但如果口碑下滑，顧客變少，入場費也會跟著下降。"
  - type: heading
    text: "用實際公司來理解"
  - type: stock_example
    stock_id: "2330"
    stock_name: "台積電"
    text: "以台積電（2330）為例，它是全球最大的半導體代工廠。如果你在 10 年前買了一張台積電的股票，你不只是在「投資一支股票」，你其實是成為了這間全球最大晶片製造商的部分擁有者。當蘋果、輝達等客戶訂單源源不斷，台積電的獲利成長，你作為股東也跟著受益。"
    data_points:
      - label: "目前股價"
        source: "latest_price.close"
  - type: callout
    style: "tip"
    text: "🎯 歷史學家提醒：我們研究過去的公司表現，是為了理解商業模式，而不是預測未來價格。過去的表現不代表未來的結果。"
  - type: heading
    text: "投資跟投機有什麼不同？"
  - type: paragraph
    text: "投機者關注的是「股票會不會漲」，他們可能在幾週甚至幾天內買賣。投資者關注的是「公司值不值得擁有」，他們願意花幾年甚至更長時間陪伴公司成長。巴菲特說：「如果你不願意擁有一支股票十年，那連十分鐘都不要持有。」這就是投資和投機的核心差異。"
quiz:
  - id: "l01_q1"
    text: "買入股票代表你成為公司的？"
    correct_key: "a"
    options:
      - ["a", "股東", "正確！買入股票代表你擁有一小部分公司的所有權，成為股東。"]
      - ["b", "債權人", "債權人是借錢給公司的人（例如債券持有人），他們獲得利息，但不擁有公司。"]
      - ["c", "員工", "員工是公司的受雇者，買股票並不會讓你自動成為員工。"]
      - ["d", "經理人", "經理人是管理公司運營的人，跟持股無關。"]
  - id: "l01_q2"
    text: "股價上漲的最主要原因是什麼？"
    correct_key: "c"
    options:
      - ["a", "只有公司在印股票", "印股票與股價無關，股價是由市場買賣雙方決定的。"]
      - ["b", "公司花錢買回自家股票", "買回股票只是影響因素之一，但不是最主要的原因。"]
      - ["c", "市場對公司未來的獲利預期變好，買盤大於賣盤", "正確！股價反映的是市場對公司未來的預期。當更多人看好，需求增加，價格自然上漲。"]
      - ["d", "股價每天都在漲，這是自然現象", "股價漲跌取決於市場供需，並非自然規律。股市也會下跌。"]
  - id: "l01_q3"
    text: "以下哪種描述最符合「投資」的精神？"
    correct_key: "b"
    options:
      - ["a", "在最短時間內買低賣高，追求最大價差", "這更像是投機，不是投資。投資關注的是公司本身的價值，不是短期價差。"]
      - ["b", "深入了解公司後，長期持有並分享公司成長的果實", "正確！投資的本質是成為公司的擁有者，陪伴公司成長，分享獲利。"]
      - ["c", "跟著熱門話題買進，賺了就跑", "這是追消息，風險很高，不是基於對公司的了解。"]
      - ["d", "看哪支股票漲最多就買哪支", "追高是很危險的策略，因為過去漲得多不代表未來也會漲。"]
completion_message: "🎉 恭喜完成第一課！你已經理解了股票的本質。下一課，我們將學習如何讀懂財務報表。"
