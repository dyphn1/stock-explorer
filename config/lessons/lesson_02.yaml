id: "lesson_02"
title: "讀懂財務報表"
order: 2
icon: "📊"
estimated_time: "8 分鐘"
difficulty: "入門"
learning_objectives:
  - "認識三大財務報表：損益表、資產負債表、現金流量表"
  - "理解營收、毛利、淨利的基本概念"
  - "知道財務比率的基本用途"
content:
  - type: heading
    text: "財務報表就像公司的健康檢查報告"
  - type: paragraph
    text: "如果你想知道一間公司「現在健不健康、未來有沒有發展潛力」，最直接的方式就是看它的財務報表。財務報表就像健檢報告數字一樣，裡面密密麻麻的數字看起來很嚇人，但實際上只要掌握幾個核心概念，你就能對公司的狀況有基本的判斷。"
  - type: callout
    style: "info"
    text: "💡 三大財務報表就像三面鏡子，分別照出公司不同面向的面貌。單獨看其中一面都不夠，要三面一起看才能拼湊出完整的圖像。"
  - type: heading
    text: "損益表：公司到底有沒有賺錢？"
  - type: paragraph
    text: "損益表（Income Statement）回答的核心問題是：「這段時間公司賺了多少錢？」它就像你的收入明細——營業收入是「賺進來的錢」，營業成本是「賣東西的成本」，營業費用是「經營公司的開銷」。收入扣掉這些成本費用後，剩下的就是淨利（Net Income），也就是公司真正賺到的錢。"
  - type: paragraph
    text: "毛利率特別值得關注。毛利 = 營收 - 成本，毛利率 = 毛利 ÷ 營收。如果一間公司的毛利率很高，代表它的產品有很強的定價能力或成本優勢。例如，精品品牌的毛利率通常遠高於雜貨店，因為品牌本身就是一種護城河。"
  - type: heading
    text: "資產負債表：公司擁有什麼、欠了什麼？"
  - type: paragraph
    text: "資產負債表（Balance Statement）是在「某一時間點」的快照，就像在一瞬間幫公司拍了一張照片。資產是公司「擁有的東西」（現金、設備、存貨等），負債是「欠別人的錢」，股東權益是「真正屬於股東的部分」。基本公式是：資產 = 負債 + 股東權益。"
  - type: heading
    text: "現金流量表：公司真的有錢嗎？"
  - type: paragraph
    text: "現金流量表（Cash Flow Statement）回答一個更實際的問題：「公司實際上有沒有現金流入？」一間公司的損益表看起來很賺錢，但如果客戶帳款收不回來，實際上銀行帳戶裡可能沒錢。現金流量表分成三個部分：營運現金流（本業賺的錢）、投資現金流（買賣資產的錢）、融資現金流（借錢或發股利的錢）。"
  - type: stock_example
    stock_id: "2317"
    stock_name: "鴻海"
    text: "以鴻海（2317）為例，它是全球最大的電子代工企業。從鴻海的損益表可以看到，它的營業收入非常巨大（一年超過6兆台幣），但毛利率相對較低（約6-7%）。這反映了代工產業的特性：營收規模極大，但利潤率薄。這類公司的競爭力在於「規模經濟」和「效率管理」——每節省一點點成本，對整體獲利就有巨大的影響。"
    data_points:
      - label: "目前股價"
        source: "latest_price.close"
  - type: heading
    text: "幾個重要的財務比率"
  - type: paragraph
    text: "ROE（股東權益報酬率）= 淨利 ÷ 股東權益，代表「股東每投入一塊錢，公司幫忙賺回多少錢」。負債比 = 總負債 ÷ 總資產，代表「公司有多少比例的資金是借來的」。流動比率 = 流動資產 ÷ 流動負債，代表「公司短期內能不能還得起快要到期的債務」。"
  - type: callout
    style: "tip"
    text: "🎯 歷史學家提醒：財務報表是基於過去的數字。過去賺錢不代表未來也會賺錢，但了解過去是判斷未來的起點。"
quiz:
  - id: "l02_q1"
    text: "損益表主要回答什麼問題？"
    correct_key: "a"
    options:
      - ["a", "公司在某段時間內賺了多少錢", "正確！損益表記錄的是一段期間內的收入、成本和利潤。"]
      - ["b", "公司目前有多少現金", "這是資產負債表和現金流量表在回答的問題。"]
      - ["c", "公司欠了多少錢", "這是資產負債表在回答的問題。"]
      - ["d", "股價漲了多少", "財務報表反映的是公司營運狀況，不是股價。"]
  - id: "l02_q2"
    text: "毛利率的計算方式是？"
    correct_key: "c"
    options:
      - ["a", "淨利 ÷ 營收", "這是淨利率，不是毛利率。"]
      - ["b", "營收 ÷ 成本", "這個比率不大常用。毛利率是毛利（營收減成本）佔營收的比例。"]
      - ["c", "（營收 - 營業成本）÷ 營收", "正確！毛利率 = 毛利 ÷ 營收，代表每一塊營收中，有多少是扣除成本後的利潤。"]
      - ["d", "股東權益 ÷ 總資產", "這是權益比，不是毛利率。"]
  - id: "l02_q3"
    text: "為什麼需要看現金流量表而不是只看損益表？"
    correct_key: "b"
    options:
      - ["a", "現金流量表比較簡單易讀", "現金流水並不一定比損益表簡單，但它提供了不同的資訊。"]
      - ["b", "因為公司可能在帳面上賺錢但實際沒有現金流入", "正確！客戶帳款可能收不回來，帳上有獲利但銀行沒現金。現金流量表揭露了實際的現金流動。"]
      - ["c", "現金流量表可以看出公司股價走勢", "現金流量表無法預測股價，它只反映現金的實際流動。"]
      - ["d", "因為法律規定優先看現金流量表", "沒有這種規定，三張報表的重要性是相同的，互相輔助。"]
completion_message: "🎉 恭喜完成第二課！你已經學會了讀懂財務報表的基本概念。下一課，我們將學習如何用本益比和股價淨值比來評估股票價值。"
next_lesson_id: "lesson_03"
