id: "lesson_03"
title: "估值基礎：本益比與股價淨值比"
order: 3
icon: "🔍"
estimated_time: "8 分鐘"
difficulty: "中級"
learning_objectives:
  - "理解本益比（PER）和股價淨值比（PBR）的意義"
  - "知道如何用這些比率做初步的估值判斷"
  - "了解估值比率的局限性"
content:
  - type: heading
    text: "你願意為一塊錢的獲利付多少錢？"
  - type: paragraph
    text: "想像你正考慮買一間早餐店，它一年淨利 50 萬元，老闆開價 500 萬元。這時候你心裡想的就會是：「我要花多少年才賺得回來？」答案就是 10 年。這 10 年就是「本益比」的概念——你願意用多少年的獲利來「買回」這間店。"
  - type: callout
    style: "info"
    text: "💡 本益比（PER）= 股價 ÷ 每股盈餘（EPS）。它回答的是：「市場目前願意為每 1 塊錢的獲利付出多少價格。」本益比越高，代表市場對公司未來越樂觀；本益比越低，代表市場認為公司比較便宜或風險較高。"
  - type: heading
    text: "本益比怎麼用？"
  - type: paragraph
    text: "假設台積電的股價是 900 元，去年的 EPS 是 30 元，那本益比就是 900 ÷ 30 = 30 倍。意思是：「按照目前的獲利水準，投資人願意用 30 年的獲利來換這張股票。」是不是很貴？不一定。如果市場預期台積電未來幾年獲利會持續成長，那這個倍數就是合理的。"
  - type: paragraph
    text: "重點是：本益比不能「跨產業」比較。科技公司的本益比通常比較高，因為市場預期高成長；而電力公司本益比通常較低，因為獲利穩定但成長緩慢。比較本益比最好的方式是跟「同產業」的公司比，或是跟公司自己「過去的歷史區間」比。"
  - type: heading
    text: "股價淨值比：股價是帳面價值的多少倍？"
  - type: paragraph
    text: "股價淨值比（PBR）= 股價 ÷ 每股淨值。它跟本益比的不同在於：本益比關注的是「獲利能力」，而股價淨值比關注的是「資產價值」。如果一間公司 PBR < 1，代表股價低於帳面價值，理論上「市場認為公司不值它的資產價值」。"
  - type: paragraph
    text: "這可能存在一個機會——但是要小心。PBR < 1 可能是市場發現了資產的帳面價值被高估，或是未來獲利下滑的信號。不是所有低 PBR 的股票都便宜，有時候「便宜有便宜的原因」。"
  - type: stock_example
    stock_id: "2881"
    stock_name: "富邦金"
    text: "以富邦金（2881）為例，作為台灣主要金控公司之一，金融產業的估值邏輯跟科技股不同。金控公司的獲利受到利率環境、放款品質和資本市場表現的影響很大。在升息循環中，銀行利差擴大，金控公司的獲利往往會改善，本益比可能隨之調整。但金融股的股價淨值比（PBR）也是重要指標——許多金控的股價長期貼近淨值，反映了市場對金融產業成長性的保守預期。這就是為什麼金融股的估值要跟同業和歷史區間比較，而不是跟科技股比。"
    data_points:
      - label: "目前股價"
        source: "latest_price.close"
  - type: heading
    text: "估值的局限性"
  - type: paragraph
    text: "本益比和股價淨值比都是「相對估值法」，它們告訴你的是股票「相」對來說貴不貴，而不是「絕對」值多少。它們的數字是基於過去的財報，但股價反映的是對未來的預期。所以當你看到一個很低或很高的本益比時，你應該問自己：「市場在反應什麼我還沒看到的事情？」"
  - type: callout
    style: "warning"
    text: "⚠️ 記住這些重要的提醒：本益比是基於過去的獲利。極高的本益比可能代表泡沫，但也可能代表高成長。極低的本益比可能是便宜貨，也可能是價值陷阱。估值是一個起點，不是結論。"
quiz:
  - id: "l03_q1"
    text: "本益比（PER）的計算方式是什麼？"
    correct_key: "a"
    options:
      - ["a", "股價 ÷ 每股盈餘（EPS）", "正確！本益比 = 股價 ÷ EPS，代表投資人願意為每塊錢的獲利付出多少價格。"]
      - ["b", "每股盈餘 ÷ 股價", "這是殖利率的反向概念（盈餘殖利率），不是本益比。"]
      - ["c", "營收 ÷ 流通股數", "這個計算沒有標準的名稱。"]
      - ["d", "股東權益 ÷ 流通股數", "這是每股淨值，不是本益比。"]
  - id: "l03_q2"
    text: "如果一間公司的本益比是 15 倍，代表什麼意思？"
    correct_key: "c"
    options:
      - ["a", "公司 15 年就會倒閉", "本益比跟公司存續時間無關。"]
      - ["b", "股價是 15 元", "本益比是倍數關係，不是絕對價格。"]
      - ["c", "按照目前獲利，投資人願意用 15 年的盈餘來換這張股票", "正確！15 倍本益比代表「以目前的獲利水準，15 年可以賺回股價」。"]
      - ["d", "公司的毛利率是 15%", "本益比和毛利率是不同的概念。"]
  - id: "l03_q3"
    text: "以下關於本益比的說法，哪一項是正確的？"
    correct_key: "d"
    options:
      - ["a", "本益比越低，一定越值得買", "不一定！低本益比可能是市場發現了你沒注意到的風險。"]
      - ["b", "本益比越高，代表股票泡沫越大", "不一定！高本益比也可能反映市場預期公司未來有高成長。"]
      - ["c", "本益比可以直接跨不同產業比較", "本益比最好的比較方式是同產業或同歷史區間。"]
      - ["d", "本益比是相對估值的前提，需要搭配成長性和產業特性一起看", "正確！本益比是一個「起點」，單獨使用很容易被誤導。"]
  - id: "l03_q4"
    text: "股價淨值比（PBR）小於 1 代表什麼？"
    correct_key: "b"
    options:
      - ["a", "公司馬上就要倒閉了", "PBR < 1 不代表公司會倒閉，只代表股價低於帳面價值。"]
      - ["b", "股價低於公司每股帳面價值", "正確！PBR < 1 代表股價低於帳面價值。這可能是機會，也可能是「便宜有便宜的原因」。"]
      - ["c", "公司獲利非常好", "PBR 跟獲利無直接關係，它關注的是資產價值。"]
      - ["d", "公司現金不足", "PBR 跟現金水位沒有直接關係。"]
completion_message: "🎉 恭喜完成第三課！你已經學會了估值的基本概念。下一課，我們將學習如何分析公司的護城河。"
