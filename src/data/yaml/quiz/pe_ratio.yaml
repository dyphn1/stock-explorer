# P/E Ratio Quiz - C101 Comprehension Check for Business Card
questions:
  - id: per_interpretation
    text: 本益比（PER）越低，代表股票越便宜、越值得買嗎？
    correct_key: b
    options:
      - [a, "對，本益比越低一定越值得買", "不一定！低本益比可能是市場認為公司未來成長性不佳，或是有潛在的風險。不能只看數字低就買進。"]
      - [b, "不一定，要看產業特性和公司成長性", "正確！不同產業的本益比區間不同。科技公司因為市場預期未來成長性高，本益比通常較高；而成熟產業的本益比通常較低。要用同產業的公司來比較才有意義。"]
      - [c, "完全無關，本益比沒有任何參考價值", "本益比還是有參考價值的，只是不能「單一指標」做判斷。它是一個很好的起點，幫助你思考「市場願意為每塊錢獲利付多少價格」。"]
      - [d, "對，所以只要找本益比最低的股票就好", "可能有陷阱！低本益比有時是因為公司遇到問題、獲利即將衰退，或市場發現了你沒注意到的風險。投資不能「只看便宜」。"]