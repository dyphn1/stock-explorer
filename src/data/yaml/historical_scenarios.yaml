# C74 Historical Scenarios — what-if analysis for major Taiwan stocks
# Source: migrated from src/pages/business_card/_historical_scenarios.yaml

"2330":
  - title: "情境一：2020 年疫情低點買入"
    content: |
      如果你在 2020 年 3 月疫情恐慌低點（約 230 元）買入台積電，持有至今（2025 年）股價約 1,000+ 元，

      📈 **報酬率：約 330%**（不含股息）

      💡 這說明了「在恐慌中買入優質資產」的長期價值。
  - title: "情境二：2022 年高點買入"
    content: |
      如果你在 2022 年 1 月高點（約 670 元）買入台積電，隨後面臨全球半導體庫存修正，股價一度跌至 370 元。

      📉 **短期跌幅：約 45%**

      💡 即使是好公司，追高買入也可能面臨大幅回檔。
  - title: "情境三：定期定額 5 年"
    content: |
      如果你從 2020 年起每月定期定額買入台積電，無論股價漲跌都持續買入，

      📊 **年化報酬率約 25-30%**

      💡 定期定額能有效平滑買入成本，適合長期投資者。

