# 歷史案例研究圖書館 — C140
# 以史學家視角記述台灣市場重大事件
# 格式：每筆案例包含標題、產業、日期、摘要、核心啟示、相關個股、主題標籤

case_studies:
  - id: "chip-shortage-2020"
    title: "晶片短缺浪潮：台積電的黃金年代"
    industry: "半導體"
    date: "2020-2021"
    summary: >
      2020 年起全球爆發前所未有的晶片短缺，從消費電子到汽車產業全面受衝擊。
      台積電作為全球先進製程代工龍頭，在這一波浪潮中營收與股價雙雙創下歷史新高。
    key_lesson: >
      供應鏈瓶頸时期，擁有不可替代技術優勢的廠商往往能獲取超額利潤。
      然而，產能滿載也意味著高資本支出的壓力，且短缺終將隨新產能開出而緩解。
    related_stocks:
      - stock_id: "2330"
        stock_name: "台積電"
    topic_tags:
      - "供需失衡"
      - "半導體"
      - "產業趨勢"
      - "地緣政治"

  - id: "foxconn-iphone12-2020"
    title: "鴻海與 iPhone 12 量產：5G 換機潮的受惠者"
    industry: "電子代工"
    date: "2020-2021"
    summary: >
      2020 年秋季蘋果發表首款支援 5G 的 iPhone 12 系列，引發大規模換機需求。
      鴻海作為蘋果主要組裝夥伴，承接了大規模量產訂單，單月營收屢創歷史紀錄。
    key_lesson: >
      終端產品世代交替為代工業帶來的營收成長往往是脈衝式的。
      量產高峰後，基數效應將使後續月營收年增率面臨壓力。
    related_stocks:
      - stock_id: "2317"
        stock_name: "鴻海"
    topic_tags:
      - "消費電子"
      - "產品週期"
      - "代工"
      - "營收爆發"

  - id: "shipping-crisis-2021"
    title: "貨櫃航運大航海時代：供不應求的運費狂飆"
    industry: "航運"
    date: "2021-2022"
    summary: >
      疫情導致全球供應鏈失衡、港口壅塞，貨櫃運力嚴重供不應求。
      長榮、陽明等台灣航運公司運費指數帶動股價創下驚人的倍數漲幅，
      陽明股價從 2020 年的個位數一度突破百元。
    key_lesson: >
      航運股的股價波動幅度遠高於一般產業，景氣高峰時的獲利爆發力驚人，
      但景氣反轉後的修正同樣劇烈。高殖利率在景氣頂峰時往往暗示循環高點。
    related_stocks:
      - stock_id: "2603"
        stock_name: "長榮"
      - stock_id: "2609"
        stock_name: "陽明"
    topic_tags:
      - "供需失衡"
      - "航運"
      - "景氣循環"
      - "價格飆漲"

  - id: "tsmc-stock-dividend-2022"
    title: "台積電股利政策轉向：季配息時代的開啟"
    industry: "半導體"
    date: "2022"
    summary: >
      2022 年台積電宣布將股利政策由年度配息改為季季配，首季每股配發現金股利 2.75 元。
      此舉帶動台股出現「季配息題材」風潮，高殖利率與穩定配息的ETF成為市場注目焦點。
    key_lesson: >
      股利政策變更雖不直接影響公司基本面，但對市場資金配置行為產生顯著影響。
      季配息機制有助於提升流動性，但短期的題材效應不應掩蓋對本業前景的評估。
    related_stocks:
      - stock_id: "2330"
        stock_name: "台積電"
    topic_tags:
      - "股利政策"
      - "市場結構"
      - "ETF"
      - "殖利率"

  - id: "panel-glut-2022"
    title: "面板產業逆風：供過於求的價格寒冬"
    industry: "顯示器"
    date: "2022-2023"
    summary: >
      2022 年下半年起，全球疫情紅利消退導致終端需求急墜，面板價格持續破底。
      友達、群創連續數季出現大幅虧損，合計虧損金額達數百億元，
      產業再次驗證了強周期特性的殺傷力。
    key_lesson: >
      面板產業的歷史反覆驗證一個模式：需求擴張期的大幅投資，
      往往在需求放緩時成為沈重負擔。虧損幅度與前期資本支出規模高度相關。
    related_stocks:
      - stock_id: "2409"
        stock_name: "友達"
      - stock_id: "3481"
        stock_name: "群創"
    topic_tags:
      - "供過於求"
      - "面板"
      - "景氣循環"
      - "價格下跌"
      - "虧損"

  - id: "jpmf-catastrophe-bond-2023"
    title: "高債息 ETF 熱潮：元大美債 20 年的上下折溢價風暴"
    industry: "金融"
    date: "2022-2023"
    summary: >
      美國聯準會急速升殖利率，債券價格大幅修正，元大美債20年（00679B）等債券ETF淨值重挫。
      然而高殖利率反吸引大批投資人湧入，ETF出現大幅溢價，之後又隨之收斂，
      溢價幅度最高曾超過 10%。
    key_lesson: >
      債券ETF的殖利率上升有時反映的是淨值下跌而非實際收益提升。
      當ETF市價大幅偏離淨值時，溢價买进的投资人承担了額外的價格風險。
      歷史顯示，異常大的溢價往往會在數週至數月內收斂。
    related_stocks:
      - stock_id: "00679B"
        stock_name: "元大美債20年"
    topic_tags:
      - "債券"
      - "ETF折溢價"
      - "升息循環"
      - "市場情緒"

  - id: "ai-boom-2024"
    title: "AI 伺服器浪潮：緯穎與台達電的產能軍備競賽"
    industry: "電子零組件"
    date: "2023-2024"
    summary: >
      生成式 AI 引爆全球資料中心擴建潮，AI 伺服器需求呈指數級成長。
      緯穎作為超大規模資料中心的主要 ODM 夥伴，營收年增率一度超過 60%；
      台達電的電源與散熱解決方案同樣供不應求，AI 相關營收占比快速攀升。
    key_lesson: >
      新興技術的硬體供應鏈在早期往往享受高毛利，但隨著競爭者加入與客戶議價，
      超額利潤存在均值回歸的壓力。領先廠商能否維持優勢，取決於技術迭代速度。
    related_stocks:
      - stock_id: "6669"
        stock_name: "緯穎"
      - stock_id: "2308"
        stock_name: "台達電"
    topic_tags:
      - "AI"
      - "資料中心"
      - "成長爆發"
      - "供應鏈"

  - id: "evergrande-spillover-2021"
    title: "恒大危機餘波：中國房市泡沫對供應鏈的連鎖衝擊"
    industry: "綜合"
    date: "2021-2023"
    summary: >
      中國恒大集團於 2021 年爆發債務違約，揭開中國房地產泡沫的序幕。
      其影響波及相關供應商與原物料產業，台灣的中鋼、台泥等與中國房市連動的
      營收與獲利明顯承壓。
    key_lesson: >
      單一企業的財務危機若身處產業核心位置，其連鎖效應可比表面影響更為深遠。
      供應鏈曝險程度的評估，需要追溯至二階、三階供應商的客戶集中度。
    related_stocks:
      - stock_id: "2002"
        stock_name: "中鋼"
      - stock_id: "1101"
        stock_name: "台泥"
    topic_tags:
      - "債務危機"
      - "房市泡沫"
      - "供應鏈風險"
      - "中國經濟"
      - "連動效應"
