# Screener Explanation Templates — C167
# All templates use historian tone (past tense, factual).
# Mandatory disclaimer appended at runtime.

preset_explanations:
  dividend:
    high_yield: "{stock_name} 殖利率為 {dividend_yield:.2f}%，高於市場平均水準，顯示公司持續配發股利的能力"
    stable: "{stock_name} 殖利率為 {dividend_yield:.2f}%，波動幅度較小，屬相對穩定的收息標的"
    fallback: "{stock_name}（{stock_id}）符合穩定收息篩選條件"
    implication: "高殖利率公司通常具穩定現金流，可留意其配息持續性"

  growth:
    strong: "{stock_name} 營收年增率達 {revenue_yoy:.1f}%，顯示營收擴張速度優於同業平均水準"
    moderate: "{stock_name} 營收年增率為 {revenue_yoy:.1f}%，呈現溫和成長趨勢"
    fallback: "{stock_name}（{stock_id}）符合成長潛力篩選條件"
    implication: "營收成長公司可能具擴張動能，可觀察其獲利是否同步提升"

  value:
    deep_value: "{stock_name} 本益比為 {per:.1f}、淨值比為 {pbr:.2f}，估值低於市場平均，市場對其評價相對保守"
    moderate_value: "{stock_name} 本益比為 {per:.1f}、淨值比為 {pbr:.2f}，估值處於合理範圍"
    fallback: "{stock_name}（{stock_id}）符合便宜估值篩選條件"
    implication: "低估值公司可能存在市場低估，可進一步評估其基本面是否穩健"

custom_filter_explanations:
  revenue_positive: "{stock_name} 營收年增率為 {revenue_yoy:.1f}%，營收較去年同期成長"
  industry_match: "{stock_name} 屬於 {industry} 產業，符合所選產業分類"
  per_range: "{stock_name} 本益比為 {per:.1f}，落在所選範圍內"
  div_range: "{stock_name} 殖利率為 {dividend_yield:.2f}%，落在所選範圍內"
  fallback: "{stock_name}（{stock_id}）符合所設篩選條件"
  implication: "符合多項篩選條件的公司，可進一步比較其財務面與評價面"

thresholds:
  dividend:
    high_yield_min: 4.0
    stable_min: 3.0
  growth:
    strong_min: 20.0
    moderate_min: 10.0
  value:
    deep_per_max: 10.0
    deep_pbr_max: 1.5
    moderate_per_max: 15.0
    moderate_pbr_max: 2.0

disclaimer: "篩選結果僅供學習參考，不構成投資建議"
