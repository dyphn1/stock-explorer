# 財經白話詞典 — C33 Beginner Glossary
# 每個詞條包含：名稱、白話解釋、真實例子、生活比喻、分類

ROE:
  name: "ROE（股東權益報酬率）"
  plain: "每100元股東資金，公司幫你賺多少錢"
  example: "ROE 25% 代表每100元股東資金賺25元"
  analogy: "就像你開店投入100萬，一年賺25萬"
  category: "獲利能力"

毛利率:
  name: "毛利率"
  plain: "賣100元東西，扣掉成本還剩多少"
  example: "毛利率 66% 代表賣100元商品，扣掉成本剩66元"
  analogy: "就像賣雞排，賣100元，成本34元，毛利66元"
  category: "獲利能力"

本益比:
  name: "本益比（PER）"
  plain: "每賺1元，市場願意付多少錢"
  example: "本益比 15 代表每賺1元，市場願付15元"
  analogy: "就像你開一間店每年賺100萬，有人願花1500萬買"
  category: "估值"

淨值比:
  name: "淨值比（PBR）"
  plain: "股價是公司帳面價值的幾倍"
  example: "淨值比 2 代表股價是帳面價值的2倍"
  analogy: "就像你朋友開的店淨值100萬，你花200萬買他的股份"
  category: "估值"

殖利率:
  name: "殖利率（股息率）"
  plain: "存100元在股市，每年領多少利息"
  example: "殖利率 4% 代表投入100萬，每年領4萬股息"
  analogy: "就像定存利率，但風險比定存高"
  category: "股利"

營收年增率:
  name: "營收年增率（YoY）"
  plain: "今年比去年同期多賺（或少賺）多少"
  example: "營收年增率 20% 代表今年營收比去年多2成"
  analogy: "就像你今年月薪5萬，去年4萬，年增長25%"
  category: "成長"

負債比:
  name: "負債比率"
  plain: "公司每100元資產中，有多少是借來的"
  example: "負債比 60% 代表100元資產有60元是借的"
  analogy: "就像你買500萬房子，貸款300萬，負債比60%"
  category: "財務健康"

流動比:
  name: "流動比率"
  plain: "公司能不能用短期資產還短期負債"
  example: "流動比 200% 代表每1元短期負債有2元短期資產可還"
  analogy: "就像你月底要還1萬，但銀行裡有3萬，很安心"
  category: "財務健康"

淨利率:
  name: "淨利率"
  plain: "每賣100元，最終能放進口袋多少"
  example: "淨利率 10% 代表營收100元，扣掉所有成本剩10元"
  analogy: "就像便利商店賣100元商品，扣掉所有成本只賺10元"
  category: "獲利能力"

營業利益率:
  name: "營業利益率"
  plain: "公司本業每100元營收賺多少"
  example: "營業利益率 15% 代表每100元營收，本業賺15元"
  analogy: "就像餐廳營收100萬，扣掉食材租金人事，本業賺15萬"
  category: "獲利能力"

自由現金流:
  name: "自由現金流"
  plain: "公司營運完，真正可以用的現金剩多少"
  example: "自由現金流10億代表公司全年可以多發股息或投資"
  analogy: "就像你月薪6萬，扣掉房租生活費2萬，可自由用4萬"
  category: "現金流"

每股盈餘:
  name: "每股盈餘（EPS）"
  plain: "公司每1股賺多少錢"
  example: "EPS 15元代表這家公司今年每股賺15元"
  analogy: "就像10個人合夥做生意，每人分到的利潤"
  category: "獲利能力"

市值:
  name: "市值"
  plain: "整家公司照股價計算值多少錢"
  example: "市值1兆代表所有股票照現在的股價值1兆"
  analogy: "就像社區房價一坪50萬，整棟100戶共值10億"
  category: "市場"

成交量:
  name: "成交量"
  plain: "今天買賣了多少數量的股票"
  example: "成交量5000張代表今天交易了500萬股"
  analogy: "就像今天菜市場賣了多少斤的菜"
  category: "市場"

多頭:
  name: "多頭市場（牛市）"
  plain: "大家預期股價會漲，搶著買"
  example: "2023-2024年台股從萬三漲到兩萬以上就是多頭"
  analogy: "就像房子越漲越有人買，形成循環"
  category: "市場趨勢"

空頭:
  name: "空頭市場（熊市）"
  plain: "大家預期股價會跌，搶著賣"
  example: "2022年台股從萬八千跌到萬三以下就是空頭"
  analogy: "就像房子越跌越沒人想買，大家都在觀望"
  category: "市場趨勢"

除權:
  name: "除權"
  plain: "公司發放股票股利，股價會按比例調降"
  example: "除權後股價會變低，但你的股票變多了"
  analogy: "就像把一塊大餅切成兩半，餅變多了但SIZE變小"
  category: "股東權益"

除息:
  name: "除息"
  plain: "公司發放現金股息，股價會減去股息金額"
  example: "除息日股價會直接減去你領到的股息"
  analogy: "就像銀行帳戶發利息後，帳面股息金額會先扣掉"
  category: "股東權益"

填權:
  name: "填權／填息"
  plain: "除權除息後股價漲回來，把缺口補滿"
  example: "除息後股價漲回除息前價位，代表填息完成"
  analogy: "就像氣球被戳破後又自然充氣飽滿"
  category: "股東權益"

貼權:
  name: "貼權／貼息"
  plain: "除權除息後股價沒漲回來，反而下跌"
  example: "除息後股價沒漲回來反而更低，賠了股息又賠價差"
  analogy: "就像水池放水後水位沒回復"
  category: "股東權益"

套牢:
  name: "套牢"
  plain: "買進股票後股價一直跌，賣就賠錢"
  example: "在100元買進跌到60元不想賣，就是被套牢"
  analogy: "就像買了高點衣服打折也不能退，只能放衣櫃"
  category: "投資行為"

停損:
  name: "停損"
  plain: "設定一個損失上限，到了就賣出"
  example: "設定虧損10%就賣出，避免更大損失"
  analogy: "就像開車看到紅燈就煞車，避免車禍"
  category: "投資行為"

停利:
  name: "停利"
  plain: "設定一個獲利目標，到了就賣出"
  example: "設定獲利30%就賣出，把錢放進口袋"
  analogy: "就像打麻將贏夠了就走，不貪心"
  category: "投資行為"

基本面:
  name: "基本面分析"
  plain: "用公司實際營運數據（營收、獲利）來評估價值"
  example: "看公司EPS、ROE來決定值不值得投資"
  analogy: "就像買房子看地段、屋齡、坪數，不是聽別人說"
  category: "分析方法"

技術面:
  name: "技術分析"
  plain: "用股價和成交量的歷史走勢來預測未來"
  example: "用K線圖和均線判斷買賣時機"
  analogy: "就像看天氣雲圖預測明天會不會下雨"
  category: "分析方法"

籌碼面:
  name: "籌碼分析"
  plain: "看誰在買賣股票（外資、投信、大戶）"
  example: "外資連續買超代表看好這檔股票"
  analogy: "就像打牌看誰在All-in，判斷牌局走向"
  category: "分析方法"

財報:
  name: "財務報告"
  plain: "公司定期公開的營運成績單"
  example: "每季公布营收、获利、現金流等重要數據"
  analogy: "就像學生的成績單，可以看各科表現"
  category: "公司資訊"

季報:
  name: "季報"
  plain: "公司每一季公布的財務報告"
  example: "每3個月的營收和獲利數字"
  analogy: "就像每段考一次的期中考成績"
  category: "公司資訊"

年報:
  name: "年報"
  plain: "公司一整年的完整財務報告"
  example: "每年公布一次，包含整年度營收獲利和展望"
  analogy: "就像學期末的學年成績單，總結全年表現"
  category: "公司資訊"

法說會:
  name: "法說會（法人說明會）"
  plain: "公司向投資法人說明營運狀況和未來展望"
  example: "法說會公布新訂單、擴廠計畫等重大消息"
  analogy: "就像學生家長會，校長說明學校未來計畫"
  category: "公司資訊"

庫藏股:
  name: "庫藏股"
  plain: "公司把自己的股票買回來"
  example: "公司認為股價被低估，花錢買回自家股票"
  analogy: "就像你開的店估值太低，你自己把股份買回來"
  category: "股東權益"

增資:
  name: "現金增資"
  plain: "公司發行新股向股東或市場借錢"
  example: "公司需要擴廠，印新股向市場借錢"
  analogy: "就像你開店需要資金，找新股東一起出錢"
  category: "公司財務"

減資:
  name: "減資"
  plain: "公司減少股本，可能為了退還現金或打消虧損"
  example: "減資50%退還股東，股本變小但每股價值提升"
  analogy: "就像把10人合夥改成5人合夥，每股變大"
  category: "公司財務"

合併:
  name: "企業合併"
  plain: "兩家公司合在一起變成一家"
  example: "鴻國合併鴻海，兩家公司合為一家"
  analogy: "就像兩家餐廳合併成連鎖品牌"
  category: "公司財務"

分割:
  name: "股票分割"
  plain: "1張股票拆成好幾張，股價按比例降低"
  example: "1張拆成2張，股價變一半，但總價值不變"
  analogy: "就像把500塊硬幣換成10個50塊硬幣"
  category: "股東權益"

子公司:
  name: "子公司"
  plain: "被另一家公司（母公司）控制的公司"
  example: "台積電的子公司包括世界先進"
  analogy: "就像連鎖飲料店的加盟店"
  category: "公司結構"

母公司:
  name: "母公司"
  plain: "控有子公司的公司"
  example: "鸿海是富士康的母公司"
  analogy: "就像頂層的老闆，下面有好多子公司"
  category: "公司結構"

轉投資:
  name: "轉投資"
  plain: "公司拿錢去投資其他公司"
  example: "台積電轉投資世界先進"
  analogy: "就像你拿錢投資朋友的店當股東"
  category: "公司財務"

業外收入:
  name: "業外收入（非營業收入）"
  plain: "不是本業賺來的錢（投資收益、租金、匯兌等）"
  example: "工廠靠土地出租賺租金，就是業外收入"
  analogy: "就像你薪水5萬，兼差家教多賺1萬元"
  category: "財報項目"

營業收入:
  name: "營業收入（營收）"
  plain: "公司本業賣產品或服務賺到的錢"
  example: "台積電每月公布當月營收"
  analogy: "就像便利商店每天的營業額"
  category: "財報項目"

稅後淨利:
  name: "稅後淨利"
  plain: "公司扣掉所有成本和稅後，真正賺到的錢"
  example: "稅後淨利100億代表公司實際賺了100億"
  analogy: "就像你月薪5萬，扣掉勞健保稅實領4.5萬"
  category: "財報項目"

折舊:
  name: "折舊"
  plain: "設備用久了會貶值，每年扣一筆估列成本"
  example: "機器買800萬用8年，每年折舊100萬"
  analogy: "就像新車落地打8折，每年都在貶值"
  category: "財報項目"

攤提:
  name: "攤提（無形資產攤銷）"
  plain: "專利、商標等無形資產的成本分攤"
  example: "花10億買專利用10年，每年攤提1億"
  analogy: "就像買軟體使用證的費用分5年攤"
  category: "財報項目"

資本支出:
  name: "資本支出（CapEx）"
  plain: "公司花錢買設備或擴建工廠"
  example: "台積電每年資本支出超過300億美元"
  analogy: "就像餐廳花錢裝潢和買新設備"
  category: "現金流"

營運現金流:
  name: "營業現金流"
  plain: "公司靠本業營業實際收到多少現金"
  example: "營業現金流為負代表本業入不敷出"
  analogy: "就像便利商店每天收的現金扣掉進貨成本"
  category: "現金流"

投資現金流:
  name: "投資活動現金流"
  plain: "公司拿去投資或買設備的現金進出"
  example: "投資現金流負100億代表花大錢擴廠"
  analogy: "就像你花錢買出租套房，租金回來前是負的"
  category: "現金流"

融資現金流:
  name: "籌資活動現金流"
  plain: "公司借錢、發股息、增減資的現金進出"
  example: "融資現金流負200億代表發了很多股息"
  analogy: "就像你去借錢或還錢的紀錄"
  category: "現金流"

資產負債表:
  name: "資產負債表（B/S）"
  plain: "公司有多少財產、欠多少錢的一次性照片"
  example: "看資產負債表知道公司身價和欠債"
  analogy: "就像幫你算命，看你名下有多少財產和負債"
  category: "財務報表"

損益表:
  name: "損益表（P&L）"
  plain: "公司一段時間內賺了多少、花了多少"
  example: "看損益公司是否賺錢"
  analogy: "就像你記帳本，算這個月賺多少花多少"
  category: "財務報表"

現金流量表:
  name: "現金流量表（C/F）"
  plain: "公司所有現金的進進出出來龍去脈"
  example: "現金流量表幫你看出獲利是真賺還是帳面"
  analogy: "就像你的銀行帳簿，一筆一筆都有記錄"
  category: "財務報表"

股東權益變動表:
  name: "股東權益變動表"
  plain: "股東的錢在這一期內怎麼變化的"
  example: "看公司發了多少股息、增了多少資"
  analogy: "就像你的儲蓄帳戶每月的明細"
  category: "財務報表"

ETF:
  name: "指數股票型基金（ETF）"
  plain: "一次買一籃子股票的基金，像股票一樣買賣"
  example: "0050是買台灣前50大公司的ETF"
  analogy: "就像去吃到飽餐廳，一次吃到所有菜色"
  category: "投資工具"

共同基金:
  name: "共同基金"
  plain: "把大家的錢集合起來，由經理人代為投資"
  example: "基金經理人幫你選股，你不用自己判斷"
  analogy: "就像集資請一個厲害的廚師幫你選餐廳"
  category: "投資工具"

債券:
  name: "債券"
  plain: "你借錢給政府或公司，對方定期還你利息"
  example: "美國公債每年固定付利息，到期還本金"
  analogy: "就像你借朋友100萬，他每年還你3萬利息"
  category: "投資工具"

股票:
  name: "股票"
  plain: "你用錢買一家公司的一部分所有權"
  example: "買一張台積電股票就擁有台積電百萬分之一"
  analogy: "就像股份有限公司的股東，按比例分利潤"
  category: "投資工具"

期貨:
  name: "期貨"
  plain: "約定未來某個時間用特定價格買賣商品"
  example: "台指期貨可以賭台股指數漲跌"
  analogy: "就像預訂六個月的雞蛋價格，不管到時漲跌"
  category: "投資工具"

選擇權:
  name: "選擇權（期權）"
  plain: "付一筆保證金，取得未來買賣的權利（非義務）"
  example: "買CALL是賭大漲，買PUT是賭大跌"
  analogy: "就像付訂金預訂房子，之後可決定要不要買"
  category: "投資工具"

權證:
  name: "認購權證"
  plain: "用小額資金賭股票漲跌的槓桿工具"
  example: "權證漲跌幅可以達到股票的數倍"
  analogy: "就像用1元彩券可能中100元的高槓桿賭注"
  category: "投資工具"

存託憑證:
  name: "存託憑證（TDR/ADR）"
  plain: "把外國公司股票放到本國市場交易"
  example: "TSMC的ADR在紐約證交所交易"
  analogy: "就像國外名店在台灣設分店"
  category: "投資工具"

美國公債:
  name: "美國公債"
  plain: "借錢給美國政府，被認為幾乎不會倒帳"
  example: "美國10年期公債是全球利率的定錨"
  analogy: "就像全世界最穩的借據，幾乎不可能不還"
  category: "投資工具"

公司債:
  name: "公司債"
  plain: "借錢給公司，利息比政府債高但風險也高"
  example: "公司債利息5%代表公司付5%給借它錢的人"
  analogy: "就像借錢給朋友做生意，利息比銀行高但有風險"
  category: "投資工具"

可轉換公司債:
  name: "可轉換公司債（CB）"
  plain: "一種可以轉換成股票的公司債"
  example: "CB持有者可選擇換成股票或繼續領利息"
  analogy: "就像租車試開，之後可決定要不要買下來"
  category: "投資工具"

信用評等:
  name: "信用評等"
  plain: "評等机构給公司或政府的信用分數"
  example: "台灣主權評等AA-代表信用良好"
  analogy: "就像銀行的信用分數，分數越高越容易借錢"
  category: "投資工具"

通貨膨脹:
  name: "通貨膨脹（通膨）"
  plain: "物價上漲，同樣的錢能買的東西變少"
  example: "通膨3%代表每年物價平均漲3%"
  analogy: "就像以前珍奶30元，現在要60元，錢變薄了"
  category: "總經"

利率:
  name: "利率"
  plain: "借錢的成本或存錢的報酬"
  example: "央行利率2%代表銀行借錢給你要收2%利息"
  analogy: "就像你租東西的租金，越貴成本越高"
  category: "總經"

匯率:
  name: "匯率"
  plain: "一國貨幣可以換多少外國貨幣"
  example: "美元兌台幣31代表1美元可換31元台幣"
  analogy: "就像出國換外幣，匯率高代表你的錢變大了"
  category: "總經"

經濟成長率:
  name: "經濟成長率（GDP成長率）"
  plain: "國家整體經濟活動比去年成長多少"
  example: "GDP成長率4%代表國家總產出比去年多4%"
  analogy: "就像你公司營業額從1億成長到1.04億"
  category: "總經"

消費者物價指數:
  name: "消費者物價指數（CPI）"
  plain: "衡量民生必需品價格變化的指標"
  example: "CPI年增2.5%代表生活成本增加2.5%"
  analogy: "就像每月記帳統計伙食、房租、交通漲了多少"
  category: "總經"

採購經理人指數:
  name: "採購經理人指數（PMI）"
  plain: "製造業景氣好不好，50以上代表擴張"
  example: "PMI 55代表製造業景氣熱絡，廠商搶著備料"
  analogy: "就像餐廳老闆看要不要多叫多的菜來備"
  category: "總經"

失業率:
  name: "失業率"
  plain: "想工作但找不到工作的人占勞動力的比例"
  example: "失業率3.5%代表100個想工作的人有3.5個找不到"
  analogy: "就像100個畢業生，有3.5個暫時還沒找到工作"
  category: "總經"

零售銷售:
  name: "零售銷售額"
  plain: "消費者在商店花了多少錢"
  example: "零售銷售額增加代表消費者願意花錢"
  analogy: "就像百貨公司週年業績比去年好"
  category: "總經"

工業生產:
  name: "工業生產指數"
  plain: "工廠生產量變化的指標"
  example: "工業生產指數上升代表工廠生意好"
  analogy: "就像工廠的生產線全開，產能滿載"
  category: "總經"

房屋開工:
  name: "房屋開工數"
  plain: "新開工建設的房子數量"
  example: "房屋開工增加代表建商看好房市"
  analogy: "就像工地越蓋越多，代表建設業景氣好"
  category: "總經"

貨幣供給:
  name: "貨幣供給量（M1B、M2）"
  plain: "市場上流通的錢有多少"
  example: "M2增加代表市場上的錢變多"
  analogy: "就像水池裡的水越多，東西越容易浮起來"
  category: "總經"

量化寬鬆:
  name: "量化寬鬆（QE）"
  plain: "央行印鈔票買債券，把錢灌進市場"
  example: "疫情期間美國QE放了一大堆熱錢出來"
  analogy: "就像水龍頭全開，讓水池的水變多"
  category: "總經"

景氣循環:
  name: "景氣循環"
  plain: "經濟擴張與衰退交替出現的週期"
  example: "一個循環通常5-10年，從谷底到高峰再回谷底"
  analogy: "就像春夏秋冬四季輪替，冷熱交替"
  category: "總經"

牛市:
  name: "牛市"
  plain: "股價長期上漲的市場"
  example: "2024年AI帶動的全球股市大多頭"
  analogy: "就像牛用牛角往上頂，股價一路往上衝"
  category: "市場趨勢"

熊市:
  name: "熊市"
  plain: "股價長期下跌的市場"
  example: "2022年通膨升息導致的全球熊市"
  analogy: "就像熊掌往下拍，股價一路往下壓"
  category: "市場趨勢"

盤整:
  name: "盤整"
  plain: "股價在一個區間內上下波動，沒有明確方向"
  example: "盤整期就是股價不漲不跌在小區間遊走"
  analogy: "就像球在谷底滾來滾去，沒有往上或往下"
  category: "市場趨勢"

突破:
  name: "突破"
  plain: "股價脫離原本的盤整區間，往一個方向衝"
  example: "突破支撐線往下，代表可能走空"
  analogy: "就像氣球撐破了外壳，往外衝"
  category: "技術分析"

支撐:
  name: "支撐"
  plain: "股價跌到這裡就跌不下去的位置"
  example: "前波低點常是支撐，大家會在這裡搶買"
  analogy: "就像地板球彈到地板就彈回來"
  category: "技術分析"

壓力:
  name: "壓力（阻力）"
  plain: "股價漲到這裡就漲不上去的位置"
  example: "前波高點常是壓力，大家會在這裡想賣"
  analogy: "就像天花板，球彈上去被壓回來"
  category: "技術分析"

均線:
  name: "移動平均線（均線）"
  plain: "過去一段時間的每日平均收盤價連成的線"
  example: "20日均線是過去20天的平均收盤價"
  analogy: "就像把每天溫度平均畫一條線，看趨勢"
  category: "技術分析"

黃金交叉:
  name: "黃金交叉"
  plain: "短期均線向上穿過長期均線，看好訊號"
  example: "5日均線穿過20日均線往上，代表短線轉強"
  analogy: "就像短跑選手加速超越長跑選手"
  category: "技術分析"

死亡交叉:
  name: "死亡交叉"
  plain: "短期均線向下穿過長期均線，看壞訊號"
  example: "5日均線穿過20日均線往下，代表短線轉弱"
  analogy: "就像短跑選手體力不支被後面的人追過"
  category: "技術分析"

RSI:
  name: "相對強弱指標（RSI）"
  plain: "看股價漲太多還是跌太多，70以上買超，30以下賣超"
  example: "RSI 80代表大眾買過頭了，可能要回檔"
  analogy: "就像溫度計，太高代表發燒，太低代表失溫"
  category: "技術分析"

KD指標:
  name: "KD指標（隨機指標）"
  plain: "看股價收盤價在近期高低點之間的位置"
  example: "KD值超過80代表買氣過熱，可能要回跌"
  analogy: "就像壓力表，太高代表快要爆掉"
  category: "技術分析"

MACD:
  name: "MACD（指數平滑異同移動平均線）"
  plain: "用兩條均線的差距看趨勢方向和強弱"
  example: "MACD由負轉正代表趨勢翻多"
  analogy: "就像看兩條河流匯流的方向改變"
  category: "技術分析"

布林通道:
  name: "布林通道"
  plain: "以均線為中心畫出上下兩條標準差通道"
  example: "股價碰到上通道代表偏貴，碰到下通道代表便宜"
  analogy: "就像河流的兩岸，水太滿就會溢出"
  category: "技術分析"

未平倉量:
  name: "未平倉量（OI）"
  plain: "期貨或選擇權還沒結算的契約數量"
  example: "未平倉量增加代表资金持續流入这个市場"
  analogy: "就像還沒結帳的交易越多，市場越熱"
  category: "選擇權/期貨"

隱含波動率:
  name: "隱含波動率（IV）"
  plain: "市場預期未來股價變動幅度的大小"
  example: "IV 50%代表市場預期股價可能大幅波動"
  analogy: "就像天氣預報說明天可能有暴風雨"
  category: "選擇權/期貨"

Beta值:
  name: "Beta值"
  plain: "個股波動和整個市場波動的比較"
  example: "Beta 1.5代表市場漲10%，這檔股票平均漲15%"
  analogy: "就像你走得比大部隊快，部隊走你走得更快"
  category: "風險指標"

夏普比率:
  name: "夏普比率（Sharpe Ratio）"
  plain: "每承受1單位風險，可以獲得多少報酬"
  example: "夏普比率2代表承擔1分風險換到2分報酬"
  analogy: "就像cp值，花1元能換回多少價值"
  category: "風險指標"

標準差:
  name: "標準差"
  plain: "數據散佈的程度，越大代表波動越大"
  example: "標準差5%代表股價波動劇烈，風險較高"
  analogy: "就像箭靶，箭越分散代表射手的穩定性越差"
  category: "風險指標"

分散投資:
  name: "分散投資（ diversification）"
  plain: "把錢分散在不同標的，不要把雞蛋放在同一個籃子"
  example: "同時投資股票、債券、ETF，一種跌另一種可能漲"
  analogy: "就像農夫同時種稻米和地瓜，不怕一種歉收"
  category: "投資策略"

定期定額:
  name: "定期定額"
  plain: "固定時間投入固定金額買股票或基金"
  example: "每月5號買3000元0050"
  analogy: "就像每個月固定存錢到豬公裡"
  category: "投資策略"

投信:
  name: "投信（投信法人）"
  plain: "專門管理投資基金的機構"
  example: "投信買賣超可看出專業基金的動向"
  analogy: "就像幫你管錢的專業經理人"
  category: "市場參與者"

外資:
  name: "外資"
  plain: "來自台灣以外的投資機構或投資人"
  example: "外資買賣超是台股最重要風向球"
  analogy: "就像外國老闆來台灣投資開公司"
  category: "市場參與者"

自營商:
  name: "自營商"
  plain: "券商用自己的錢買賣股票"
  example: "自營商買賣超代表券商自己對市場的看法"
  analogy: "就像菜市場老闆拿自己錢進貨來賣"
  category: "市場參與者"
