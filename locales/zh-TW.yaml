    dividend_yield_knowledge: 殖利率小知識
    dividend_yield_content: 殖利率 = 年度股利 ÷ 股價 × 100%。殖利率越高代表每投入 1 元能領回的現金越多，但高殖利率不等於高報酬，仍需留意 ETF 的追蹤誤差、費用率及折溢價狀況。
    price_label: 價格：
    change_label: 漲跌：
    filet:
      price: "價格：{price}"
      change: "漲跌：{change}"
  detail:
    one_liner_50: 追蹤台灣前 50 大企業的指數型基金
    one_liner_dividend: 專注於高股息股票的收益型基金
    one_liner_bond: 投資債券市場的固定收益型基金
    one_liner_esg: 考慮環境、社會、治理的永續投資型基金
    one_liner_default: 一籃子股票的分散投資工具
    knowledge_50: "ETF（指數股票型基金）就像「一籃子股票」的套餐，一次買進就等於持有前 50 大上市公司。不用選股、自動跟著大盤走，管理費也遠低於主動型基金，適合想參與台股大盤但不想個股研究的投資人。"
    knowledge_dividend: "高股息 ETF 專門挑選「現金股利大方」的公司，目標是讓投資人定期收到配息，就像收房租一樣有穩定現金流。適合需要定期收入（如退休族）或偏好領息而非賺價差的投資人。"
    knowledge_bond: "債券 ETF 投資的是政府或企業發行的債券，性質類似「借錢給對方、對方按期付利息」。波動通常比股票小，報酬來源主要是配息而非價差，適合保守型投資人或在股市震盪時作為避風港。"
    knowledge_esg: "ESG ETF 在選股時除了看財務表現，還會評估企業的環保（E）、社會責任（S）與公司治理（G）。概念是「好公司不只賺錢，還要對世界好」，適合重視永續發展、不想投資高污染或爭議產業的投資人。"
    knowledge_default: "ETF（指數股票型基金）就像一籃子股票的套餐，一次買進就分散持有多檔標的。好處是不用自己選股、管理費低、透明度高，適合想參與市場但不想花時間研究個股的投資人。"
