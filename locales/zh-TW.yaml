      content: 如果你在 2017 年歷史高點（約 {buy_price} 元）買入大立光，隨後面臨中國競爭對手崛起與手機市場飽和。\n\n📉 **跌幅：約
        {drop_range}%**\n\n💡 即使是護城河極深的公司，也可能面臨結構性挑戰。
    s2:
      title: 情境二：2020 年低點買入
      content: 如果你在 2020 年 3 月（約 {buy_price} 元）買入大立光，持有至今（{current_year} 年）股價約 {current_price}
        元，\n\n📉 **跌幅：約 {drop_pct}%**\n\n💡 即使是低點買入，若產業結構惡化仍可能虧損。
    s3:
      title: 情境三：定期定額 5 年
      content: 如果你從 {start_year} 年起每月定期定額買入大立光，\n\n📊 **年化報酬：約 {annual_return}%**\n\n💡
        定期定額無法避免結構性衰退的產業。
