  browser:
    title: ETF 瀏覽
    subtitle: 探索台灣 ETF 市場：熱門排行、分類瀏覽、配息比較
    what_is_etf: 什麼是 ETF？
    what_is_etf_content: "ETF（指數股票型基金）就像一個「股票籃子」，一次買進就等於買進一籃子標的。例如買入 0050，等於同時持有台灣市值最大的 50 間公司股票。ETF 可以像股票一樣在交易所買賣，費用比基金低，適合新手分散投資。\\n\\n⚠️ 注意：ETF 價格會隨市場波動，投資前請評估自身風險承受能力。"
    loading_data: 載入 ETF 資料中…
