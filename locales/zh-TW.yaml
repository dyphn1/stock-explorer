    fee_reminder_content: "ETF 的總費用（經理費 + 保管費 + 其他）通常比主動型基金低很多。以台股 ETF 為例，總費用率大約 0.3%~0.5%，而主動型基金可能 1.5% 以上。長期投資下來，省下來的費用會默默幫你多賺好幾年的複利！"
