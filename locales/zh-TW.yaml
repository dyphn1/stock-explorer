    dividend_explanation_title: 股利白話說明
    dividend_explanation_content: "「現金股利」是公司直接發錢給你，就像房東每月匯房租到你戶頭。\n「除息日」是股價會扣除配息金額的日子，所以除息當天股價會「自然下跌」，不代表賠錢。"
