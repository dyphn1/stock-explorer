metric_education:
  roe_display_name: 股東權益報酬率
  roe_explanation: >-
    ROE 衡量公司用股東的錢賺錢的效率。ROE 15% 表示每 100 元股東資本，
    公司一年賺 15 元。越高代表公司越會賺錢。
  roe_historical_context: >-
    台股平均 ROE 約 10-12%。ROE 長期維持 15% 以上的公司通常具備
    競爭優勢（護城河）。巴菲特偏好 ROE 長期高於 20% 的公司。
  roe_warning_seasonal_insufficient: "{industry} 屬季節性產業，僅{quarters}季資料可能無法反映完整年度表現。目前 ROE 為 TTM 估算值。"
  roe_warning_seasonal_sufficient: "{industry} 屬季節性產業，TTM 計算已涵蓋完整四季，但各季波動較大，建議參考多年趨勢。"
  gross_margin_display_name: 毛利率
  gross_margin_explanation: >-
    毛利率是賣出商品後，扣掉直接成本（原料、人工）剩下的利潤比例。
    毛利率 40% 表示每賣 100 元，扣掉成本還剩 40 元。越高代表產品
    越有定價能力。
  gross_margin_historical_context: >-
    不同產業毛利率差異很大：軟體業可達 80%以上，代工廠可能只有
    5-10%。跟自己過去的毛利率比較，比跟不同產業比較更有意義。
  net_margin_display_name: 淨利率
  net_margin_explanation: >-
    淨利率是扣掉所有成本（營業費用、利息、稅金）後，真正賺到的錢。
    淨利率 10% 表示每賣 100 元，公司最後口袋剩 10 元。越高代表公司
    控制成本的能力越好。
  net_margin_historical_context: >-
    淨利率會受一次性業外損益影響，建議看近 4-8 季的趨勢而非單季數字。
    科技業淨利率通常 10-30%，零售業可能只有 1-5%。
  debt_ratio_display_name: 負債比
  debt_ratio_explanation: >-
    負債比是公司資產中有多少比例是借來的錢。負債比 60% 表示每 100 元
    資產中，有 60 元是借來的。越低代表財務越保守，但適度借錢可以
    加速成長。
  debt_ratio_historical_context: >-
    金融業負債比通常 80-90%（因為存款算負債），這是正常的。製造業
    建議負債比控制在 50% 以下。景氣差時高負債比風險較大。
  revenue_yoy_display_name: 營收年增率
  revenue_yoy_explanation: >-
    營收年增率是跟去年同月比較，營收成長或衰退的幅度。年增 20% 表示
    今年營收比去年同月多 20%。正數代表成長，負數代表衰退。
  revenue_yoy_historical_context: >-
    單月營收年增率波動較大，建議看 3-6 個月的趨勢更有參考價值。
    季節性產業（如冷飲、觀光）需考慮淡旺季因素。
  per_display_name: 本益比
  per_explanation: >-
    本益比是股價除以每股盈餘，代表市場願意為公司每賺 1 元付多少錢。
    本益比 15 倍表示市場願意為每 1 元獲利付 15 元。越低代表回本
    越快，但也可能反映市場不看好。
  per_historical_context: >-
    台股歷史本益比區間約 10-25 倍。不同產業合理本益比不同：成長股
    可能 20-30 倍，景氣循環股可能 8-12 倍。虧損公司沒有本益比。
  pbr_display_name: 淨值比
  pbr_explanation: >-
    淨值比是股價除以每股淨值，代表股價相對於公司帳面價值的倍數。
    淨值比 1.5 表示股價是淨值的 1.5 倍。低於 1 表示股價比淨值還便宜
    （但可能有原因）。
  pbr_historical_context: >-
    淨值比適合評估資產密集型產業（如銀行、營建）。輕資產公司
    （如軟體、品牌）淨值比通常較高，因為價值在無形資產。巴菲特
    早期偏好淨值比低於 1 的股票。
  dividend_yield_display_name: 殖利率
  dividend_yield_explanation: >-
    殖利率是每年配發的股利除以股價，代表投資一年能領回的現金比例。
    殖利率 4% 表示每投資 100 元，一年約領回 4 元股利。越高代表配息
    多，但太高可能代表股價下跌或配息不可持續。
  dividend_yield_historical_context: >-
    台股平均殖利率約 3-4%。殖利率 5% 以上算高息股，但要注意：
    1) 是否為一次性業外收入造成的超高殖利率；2) 公司是否有賺錢。
    過去 5 年穩定配息的公司較可靠.
  net_margin_analogy_good: "每賣 100 元東西，扣掉所有開銷後剩 {val:.1f} 元 — 獲利能力不錯"
  net_margin_analogy_ok: "每賣 100 元東西，扣掉所有開銷後剩 {val:.1f} 元 — 利潤空間有限"
  net_margin_analogy_poor: "每賣 100 元東西，扣掉所有開銷後剩 {val:.1f} 元 — 賺錢很辛苦"
  fallback_title: "{metric_name} 是衡量公司表現的指標之一。"
  fallback_context: "這個指標需要更多背景資料才能提供比喻。"
  fallback_suggestion: "建議查閱更多關於此指標的資料。"
  net_margin_analogy_high: "每賣 100 元，扣掉所有開銷後剩 {val:.1f} 元 — 獲利能力不錯"
  net_margin_analogy_mid: "每賣 100 元，扣掉所有開銷後剩 {val:.1f} 元 — 利潤空間有限"
  net_margin_analogy_low: "每賣 100 元，扣掉所有開銷後剩 {val:.1f} 元 — 賺錢很辛苦"
  fallback:
    explanation: "{metric_name} 是衡量公司表現的指標之一。"
    analogy: "這個指標需要更多背景資料才能提供比喻。"
    historical_context: "建議查閱更多關於此指標的資料。"
