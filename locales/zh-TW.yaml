historical_scenario:
  '2330':
    s1:
      title: 情境一：2020 年疫情低點買入
      content: 如果你在 2020 年 3 月疫情恐慌低點（約 {buy_price} 元）買入台積電，持有至今（{current_year} 年）股價約
        {current_price} 元，\n\n📈 **報酬率：約 {return_pct}%**（不含股息）\n\n💡 這說明了「在恐慌中買入優質資產」的長期價值。
    s2:
      title: 情境二：2022 年高點買入
      content: 如果你在 2022 年 1 月高點（約 {buy_price} 元）買入台積電，隨後面臨全球半導體庫存修正，股價一度跌至 {low_price}
        元。\n\n📉 **短期跌幅：約 {drop_pct}%**\n\n💡 即使是好公司，追高買入也可能面臨大幅回檔。
    s3:
      title: 情境三：定期定額 5 年
      content: 如果你從 {start_year} 年起每月定期定額買入台積電，無論股價漲跌都持續買入，\n\n📊 **年化報酬率約 {annual_return}%**\n\n💡
        定期定額能有效平滑買入成本，適合長期投資者。
  '2317':
    s1:
      title: 情境一：2020 年疫情低點買入
      content: 如果你在 2020 年 3 月（約 {buy_price} 元）買入鴻海，持有至今（{current_year} 年）股價約 {current_price}
        元，\n\n📈 **報酬率：約 {return_pct}%**（含股息）\n\n💡 鴻海的轉型故事需要耐心，長期持有才能看到成果。
    s2:
      title: 情境二：2017 年高點買入
      content: 如果你在 2017 年高點（約 {buy_price} 元）買入鴻海，隨後面臨蘋果手機銷售放緩，股價長期低迷。\n\n📉 **{years}
        年報酬：約 {return_range}%**（含股息）\n\n💡 買在高點可能需要更長的時間才能回本。
    s3:
      title: 情境三：AI 伺服器題材爆發
      content: 如果你在 {buy_date}（約 {buy_price} 元）看好 AI 伺服器趨勢買入鴻海，至今股價約 {current_price}
        元，\n\n📈 **報酬率：約 {return_pct}%**\n\n💡 掌握產業趨勢，在題材發酵前布局能獲得超額報酬。
  '2454':
    s1:
      title: 情境一：2021 年高點買入
