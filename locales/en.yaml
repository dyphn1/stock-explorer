        💡 This demonstrates the long-term value of buying quality assets during panic.'
    s2:
      title: 'Scenario 2: Buying at the 2022 High'
      content: 'If you had bought TSMC at the January 2022 high (around {buy_price}
        TWD), you would have faced the global semiconductor inventory correction,
        with the stock price falling to {low_price} TWD.


