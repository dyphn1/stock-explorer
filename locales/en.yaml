  "2330":
    s1:
      title: "Scenario 1: Buying at the 2020 Pandemic Low"
      content: "If you had bought TSMC at the pandemic panic low in March 2020 (around {buy_price} TWD) and held until now ({current_year}), the stock price is approximately {current_price} TWD.\n\n📈 **Return: approx. {return_pct}%** (excl. dividends)\n\n💡 This demonstrates the long-term value of buying quality assets during panic."
    s2:
      title: "Scenario 2: Buying at the 2022 High"
