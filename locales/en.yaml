    knowledge_50: "ETF (Exchange-Traded Fund) is like a \"basket of stocks\" — one purchase means you hold shares in the top 50 listed companies. No stock picking needed, it automatically follows the market, with management fees far lower than active funds. Ideal for investors who want exposure to Taiwan's market without researching individual stocks."
    knowledge_dividend: "High-dividend ETFs select companies that pay generous cash dividends, aiming to give investors regular payouts — like collecting rent. Suitable for those who need regular income (e.g., retirees) or prefer dividends over capital gains."
    knowledge_bond: "Bond ETFs invest in government or corporate bonds — essentially \"lending money to them in exchange for regular interest.\" Volatility is usually lower than stocks, and returns come mainly from dividends rather than price appreciation. Suitable for conservative investors or as a safe haven during market turbulence."
    knowledge_esg: "ESG ETFs evaluate companies not only on financial performance but also on Environmental, Social, and Governance factors. The idea is \"good companies don't just make money — they do good for the world.\" Suitable for investors who care about sustainability and don't want to invest in polluting or controversial industries."
    knowledge_default: "ETF (Exchange-Traded Fund) is like a basket of stocks — one purchase diversifies your holdings across multiple benefits. Benefits include no need for stock picking, low management fees, and high transparency. Ideal for investors who want market exposure without spending time on individual stock research."
