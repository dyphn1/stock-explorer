    stock_name: "MediaTek"
    ic_leader: "**IC Design Leader**: MediaTek is one of the world's major smartphone chipset suppliers, with its Dimensity 5G series gaining traction in both flagship and mid-range segments."
    ai_edge: "**AI Edge Computing**: Actively expanding into AI PC and automotive chip markets. The automotive chip solution developed with NVIDIA has drawn significant attention."
