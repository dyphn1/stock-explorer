    knowledge_bond: "Bond ETFs invest in government or corporate bonds — essentially \"lending money to them in exchange for regular interest.\" Volatility is usually lower than stocks, and returns come mainly from dividends rather than price appreciation. Suitable for conservative investors or as a safe haven during market turbulence."
    knowledge_esg: "ESG ETFs evaluate companies not only on financial performance but also on Environmental, Social, and Governance factors. The idea is \"good companies don't just make money — they do good for the world.\" Suitable for investors who care about sustainability and don't want to invest in polluting or controversial industries."
