historical_scenario:
  '2330':
    s1:
      title: 'Scenario 1: Buying at the 2020 Pandemic Low'
      content: 'If you had bought TSMC at the pandemic panic low in March 2020 (around
        {buy_price} TWD) and held until now ({current_year}), the stock price is approximately
        {current_price} TWD.


        📈 **Return: approx. {return_pct}%** (excl. dividends)


        💡 This demonstrates the long-term value of buying quality assets during panic.'
    s2:
      title: 'Scenario 2: Buying at the 2022 High'
      content: 'If you had bought TSMC at the January 2022 high (around {buy_price}
        TWD), you would have faced the global semiconductor inventory correction,
        with the stock price falling to {low_price} TWD.


        📉 **Short-term drop: approx. {drop_pct}%**


        💡 Even good companies can face significant drawdowns if bought at a peak.'
    s3:
      title: 'Scenario 3: DCA Over 5 Years'
      content: 'If you had invested in TSMC via dollar-cost averaging every month
        starting from {start_year}, regardless of price fluctuations,


        📊 **Annualized return approx. {annual_return}%**


        💡 DCA effectively smooths out purchase costs and is suitable for long-term
        investors.'
  '2317':
    s1:
      title: 'Scenario 1: Buying at the 2020 Pandemic Low'
      content: 'If you had bought Foxconn in March 2020 (around {buy_price} TWD) and
        held until now ({current_year}), the stock price is approximately {current_price}
        TWD.


        📈 **Return: approx. {return_pct}%** (incl. dividends)


        💡 Foxconn''s transformation story requires patience; long-term holding is
        needed to see results.'
    s2:
      title: 'Scenario 2: Buying at the 2017 High'
      content: 'If you had bought Foxconn at the 2017 high (around {buy_price} TWD),
        you would have faced slowing iPhone sales and a prolonged period of stagnation.


        📉 **{years}-year return: approx. {return_range}%** (incl. dividends)


        💡 Buying at a peak may require a much longer time to break even.'
    s3:
      title: 'Scenario 3: AI Server Theme Breakout'
      content: 'If you had bought Foxconn in early {buy_date} (around {buy_price}
        TWD) based on the AI server trend, the stock price is now approximately {current_price}
        TWD.


        📈 **Return: approx. {return_pct}%**


        💡 Identifying industry trends before they gain traction can yield excess returns.'
  '2454':
    s1:
      title: 'Scenario 1: Buying at the 2021 High'
      content: 'If you had bought MediaTek at the 2021 high (around {buy_price} TWD),
        you would have faced a smartphone market downturn and inventory correction.


        📉 **Short-term drop: approx. {drop_pct}%**


        💡 Even growth stocks carry risks when bought at excessive valuations.'
    s2:
      title: 'Scenario 2: Buying at the 2023 Low'
      content: 'If you had bought MediaTek at the 2023 low (around {buy_price} TWD),
        benefiting from smartphone market recovery and AI PC themes,


        📈 **Return: approx. {return_range}%**


        💡 Buying quality companies at industry troughs can yield substantial returns.'
    s3:
      title: 'Scenario 3: DCA Over 3 Years'
      content: 'If you had invested in MediaTek via dollar-cost averaging every month
        starting from {start_year},


        📊 **Annualized return approx. {annual_return}%**


        💡 DCA is particularly effective on high-volatility tech stocks.'
  '2308':
