    stock_name: "Fubon Financial"
    financial_giant: "**Financial Holding Giant**: Fubon Financial is one of Taiwan's largest financial holding companies, with businesses spanning banking, life insurance, and securities."
    profit_stable: "**Stable Profitability**: Benefiting from the rate hike cycle and capital market recovery. Life insurance spread loss pressure has eased, and net interest income on the banking side has grown."
    risk: "**Risk Warning**: Financial market volatility and currency risks require ongoing attention."
  cathay_finance:
    stock_name: "Cathay Financial"
    financial_duo: "**One of the Financial Duo**: Cathay Financial is Taiwan's largest financial holding company. Cathay Life is Taiwan's largest life insurer, and Cathay United Bank is a leading commercial bank."
    digital_transform: "**Digital Transformation**: Actively promoting digital financial services, with growing users on mobile banking and online insurance platforms."
    risk: "**Risk Warning**: The life insurance industry faces IFRS 17 accounting standard transition challenges, and capital market volatility affects investment returns."
