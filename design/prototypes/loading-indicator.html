<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Indicator</title>
    <style>
        :root {
            --primary-accent: #3498DB;
            --primary-text: #2C3E50;
            --secondary-text: #7F8C8D;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #F0F2F5;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 18px;
            color: var(--primary-text);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .sub-text {
            font-size: 14px;
            color: var(--secondary-text);
            margin-top: 8px;
        }

        /* Mock content behind overlay to show blur effect */
        .content-behind {
            padding: 40px;
            color: #ccc;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="content-behind">
        <h1>Page Content</h1>
        <p>This content is behind the loading overlay to demonstrate the backdrop-filter effect.</p>
        <div style="display: flex; justify-content: center; gap: 20px; margin-top: 20px;">
            <div style="width: 200px; height: 100px; background: #ddd;"></div>
            <div style="width: 200px; height: 100px; background: #ddd;"></div>
            <div style="width: 200px; height: 100px; background: #ddd;"></div>
        </div>
    </div>

    <div class="overlay">
        <div class="spinner"></div>
        <div class="loading-text">Loading data...</div>
        <div class="sub-text">Please wait a moment while we fetch the latest market data</div>
    </div>
</body>
</html>
